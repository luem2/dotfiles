base_package_groups:
    - "@development-tools"
    - "@C Development Tools and Libraries"
    - "@Container Management"
    - "@Administration Tools"
    - "@Standard"

base_packages:
    - git
    - curl
    - wget
    - neovim
    - ripgrep
    - fd-find
    - fzf
    - bat
    - jq
    - htop
    - btop
    - tree
    - unzip
    - zip
    - rsync
    - stow
    - zoxide
    - eza
    - shellcheck
    - wl-clipboard
    - fontconfig
    - dnf-plugins-core
    - NetworkManager-openvpn
    - NetworkManager-wireguard
    - openvpn
    - wireguard-tools
    - podman
    - podman-compose
    - golang
    - golang-x-tools
    - delve
    - rust
    - cargo

go_tools:
    - name: air
      module: github.com/air-verse/air@latest
      binary: air

nerd_fonts:
    - name: JetBrainsMono
      url: https://github.com/ryanoasis/nerd-fonts/releases/latest/download/JetBrainsMono.zip
    - name: CascadiaCode
      url: https://github.com/ryanoasis/nerd-fonts/releases/latest/download/CascadiaCode.zip

dms_copr_repo: avengemedia/dms
dms_copr_repo_file: /etc/yum.repos.d/_copr:copr.fedorainfracloud.org:avengemedia:dms.repo

install_steam: false
gaming_packages:
    - steam
