# yaml-language-server: $schema=https://raw.githubusercontent.com/ansible/ansible-lint/main/src/ansiblelint/schemas/ansible.json#/$defs/playbook
- name: Bootstrap Desktop Environment
  hosts: localhost
  become: true

  vars:
      ansible_callback_whitelist: profile_tasks
      dotfiles_user_home: "{{ lookup('env', 'HOME') }}"
      dotfiles_user_name: "{{ lookup('env', 'USER') }}"
      dotfiles_user_uid: "{{ lookup('ansible.builtin.pipe', 'id -u ' ~ dotfiles_user_name) }}"
      dotfiles_local_vars_path: "{{ dotfiles_user_home }}/.config/dotfiles/vars.yml"
      dotfiles_fonts_dir: "{{ dotfiles_user_home }}/.local/share/fonts"
      dotfiles_fonts_cache_dir: "{{ dotfiles_user_home }}/.cache/dotfiles/fonts"

  pre_tasks:
      - name: Announce local overrides path
        ansible.builtin.debug:
            msg: "Looking for local overrides at {{ dotfiles_local_vars_path }}"
        changed_when: false
        become: false

      - name: Check for local overrides
        ansible.builtin.stat:
            path: "{{ dotfiles_local_vars_path }}"
        register: dotfiles_local_vars
        become: false

      - name: Load local overrides
        ansible.builtin.include_vars:
            file: "{{ dotfiles_local_vars_path }}"
        when: dotfiles_local_vars.stat.exists
        become: false

  tasks:
      - name: Announce system package setup
        ansible.builtin.debug:
            msg: "System packages and updates"
        changed_when: false

      - name: Upgrade all packages
        ansible.builtin.dnf:
            name: "*"
            state: latest

      - name: Install package groups
        ansible.builtin.dnf:
            name: "{{ base_package_groups }}"
            state: present

      - name: Install optional multimedia group
        ansible.builtin.dnf:
            name: "{{ optional_package_groups.multimedia }}"
            state: present
        when: install_multimedia_group | bool

      - name: Install optional hardware support group
        ansible.builtin.dnf:
            name: "{{ optional_package_groups.hardware_support }}"
            state: present
        when: install_hardware_support_group | bool

      - name: Install base packages (core)
        ansible.builtin.dnf:
            name: "{{ base_packages_core }}"
            state: present

      - name: Install base packages (dev)
        ansible.builtin.dnf:
            name: "{{ base_packages_dev }}"
            state: present

      - name: Install base packages (gui)
        ansible.builtin.dnf:
            name: "{{ base_packages_gui }}"
            state: present

      - name: Install pipes.sh from source
        block:
            - name: Clone pipes.sh
              ansible.builtin.git:
                  repo: "https://github.com/pipeseroni/pipes.sh.git"
                  dest: /tmp/pipes.sh
                  depth: 1

            - name: Build and install pipes.sh
              ansible.builtin.command:
                  cmd: make install
                  chdir: /tmp/pipes.sh
                  creates: /usr/local/bin/pipes.sh

            - name: Clean up pipes.sh source
              ansible.builtin.file:
                  path: /tmp/pipes.sh
                  state: absent

      - name: Enable Ghostty COPR repo
        ansible.builtin.command:
            cmd: "dnf -y copr enable {{ ghostty_copr_repo }}"
            creates: "{{ ghostty_copr_repo_file }}"

      - name: Install Ghostty
        ansible.builtin.dnf:
            name: ghostty
            state: present

      - name: Enable Starship COPR repo
        ansible.builtin.command:
            cmd: "dnf -y copr enable {{ starship_copr_repo }}"
            creates: "{{ starship_copr_repo_file }}"

      - name: Install Starship
        ansible.builtin.dnf:
            name: starship
            state: present

      - name: Enable Danklinux COPR repo
        ansible.builtin.debug:
            msg: "Dank Search will be built from source"
        changed_when: false

      - name: Install Dank Search from source
        block:
            - name: Ensure local source directory
              ansible.builtin.file:
                  path: "{{ dotfiles_user_home }}/.local/src"
                  state: directory
                  mode: "0755"
              become: false

            - name: Clone danksearch
              ansible.builtin.git:
                  repo: "https://github.com/AvengeMedia/danksearch.git"
                  dest: "{{ dotfiles_user_home }}/.local/src/danksearch"
                  depth: 1
              become: false

            - name: Build danksearch
              ansible.builtin.command:
                  cmd: make
                  chdir: "{{ dotfiles_user_home }}/.local/src/danksearch"
                  creates: "{{ dotfiles_user_home }}/.local/src/danksearch/dsearch"
              become: false

            - name: Install danksearch binary
              ansible.builtin.command:
                  cmd: make install
                  chdir: "{{ dotfiles_user_home }}/.local/src/danksearch"
                  creates: /usr/local/bin/dsearch

            - name: Ensure user systemd directory
              ansible.builtin.file:
                  path: "{{ dotfiles_user_home }}/.config/systemd/user"
                  state: directory
                  mode: "0755"
              become: false

            - name: Ensure user state directory
              ansible.builtin.file:
                  path: "{{ dotfiles_user_home }}/.local/state"
                  state: directory
                  mode: "0755"
              become: false

            - name: Install danksearch user service
              ansible.builtin.copy:
                  dest: "{{ dotfiles_user_home }}/.config/systemd/user/danksearch-install.service"
                  mode: "0644"
                  content: |
                      [Unit]
                      Description=Install Dank Search user service once
                      ConditionPathExists=!%h/.local/state/danksearch-installed

                      [Service]
                      Type=oneshot
                      ExecStart=/usr/bin/make -C %h/.local/src/danksearch install-service
                      ExecStartPost=/usr/bin/touch %h/.local/state/danksearch-installed
                      RemainAfterExit=no

                      [Install]
                      WantedBy=default.target
              become: false

            - name: Enable danksearch install service
              ansible.builtin.systemd:
                  name: danksearch-install.service
                  enabled: true
                  scope: user
              become: false

      - name: Download eza
        ansible.builtin.get_url:
            url: "https://github.com/eza-community/eza/releases/latest/download/eza_x86_64-unknown-linux-gnu.tar.gz"
            dest: /tmp/eza.tar.gz
            mode: "0644"

      - name: Install eza
        ansible.builtin.unarchive:
            src: /tmp/eza.tar.gz
            dest: /usr/local/bin
            remote_src: true
            creates: /usr/local/bin/eza

      - name: Ensure eza binary permissions
        ansible.builtin.file:
            path: /usr/local/bin/eza
            mode: "0755"

      - name: Clean up eza tarball
        ansible.builtin.file:
            path: /tmp/eza.tar.gz
            state: absent

      - name: Fetch latest Anytype release metadata
        ansible.builtin.uri:
            url: "https://api.github.com/repos/anyproto/anytype-ts/releases/latest"
            return_content: true
            status_code: 200
            headers: >-
                {{
                  {'Accept': 'application/vnd.github+json'}
                  | combine(anytype_github_token | length > 0
                    | ternary({'Authorization': 'Bearer ' ~ anytype_github_token}, {}))
                }}
        register: anytype_release
        when:
            - install_anytype_rpm | bool
            - anytype_rpm_url | length == 0
        failed_when: false

      - name: Debug Anytype release assets
        ansible.builtin.debug:
            msg: "{{ anytype_release.json.assets | map(attribute='name') | list }}"
        when:
            - install_anytype_rpm | bool
            - anytype_release is defined
            - anytype_release.status == 200

      - name: Select Anytype RPM asset
        ansible.builtin.set_fact:
            anytype_rpm_url: "{{ item.browser_download_url }}"
        loop: "{{ anytype_release.json.assets }}"
        when:
            - install_anytype_rpm | bool
            - anytype_release is defined
            - anytype_release.status == 200
            - item.name is regex('.*\\.x86_64\\.rpm$')
            - anytype_rpm_url is not defined

      - name: Skip Anytype install when RPM asset is missing
        ansible.builtin.debug:
            msg: "Anytype RPM asset not found in latest GitHub release; skipping install."
        when:
            - install_anytype_rpm | bool
            - anytype_rpm_url is not defined or anytype_rpm_url | length == 0

      - name: Install Anytype RPM
        ansible.builtin.dnf:
            name: "{{ anytype_rpm_url }}"
            state: present
            disable_gpg_check: true
        when:
            - install_anytype_rpm | bool
            - anytype_rpm_url is defined

      - name: Configure VS Code repository
        ansible.builtin.yum_repository:
            name: vscode
            description: Visual Studio Code
            baseurl: https://packages.microsoft.com/yumrepos/vscode
            enabled: true
            gpgcheck: true
            gpgkey: https://packages.microsoft.com/keys/microsoft.asc

      - name: Configure Google Chrome repository
        ansible.builtin.yum_repository:
            name: google-chrome
            description: Google Chrome
            baseurl: http://dl.google.com/linux/chrome/rpm/stable/$basearch
            enabled: true
            gpgcheck: true
            gpgkey: https://dl.google.com/linux/linux_signing_key.pub

      - name: Install repository packages
        ansible.builtin.dnf:
            name: "{{ repo_packages }}"
            state: present

      - name: Install virtualization packages
        ansible.builtin.dnf:
            name: "{{ virtualization_packages }}"
            state: present

      - name: Check SELinux status
        ansible.builtin.command: getenforce
        register: selinux_status
        changed_when: false

      - name: Set SELinux to enforcing if needed
        ansible.builtin.command: setenforce 1
        when: selinux_status.stdout != "Enforcing"

      - name: Ensure SELinux config is enforcing
        ansible.builtin.lineinfile:
            path: /etc/selinux/config
            regexp: "^SELINUX="
            line: "SELINUX=enforcing"
        when: selinux_status.stdout != "Enforcing"

      - name: Report SELinux status
        ansible.builtin.debug:
            msg: "SELinux status: {{ selinux_status.stdout }}"
        changed_when: false

      - name: Gather service facts
        ansible.builtin.service_facts:

      - name: Detect existing display manager
        ansible.builtin.set_fact:
            has_display_manager: "{{ 'display-manager.service' in ansible_facts.services }}"

      - name: Install greetd packages
        ansible.builtin.dnf:
            name: "{{ greetd_packages }}"
            state: present
        when:
            - install_greetd_if_no_dm | bool
            - force_greetd | bool or not has_display_manager

      - name: Configure greetd for Niri
        ansible.builtin.copy:
            dest: /etc/greetd/config.toml
            mode: "0644"
            content: |
                [terminal]
                vt = 1

                [default_session]
                command = "dms-greeter --command niri -C /etc/greetd/niri.kdl"
                user = "greeter"
        when:
            - install_greetd_if_no_dm | bool
            - force_greetd | bool or not has_display_manager

      - name: Configure greetd Niri session
        ansible.builtin.copy:
            dest: /etc/greetd/niri.kdl
            mode: "0644"
            content: |
                environment {
                    DMS_RUN_GREETER "1"
                }
        when:
            - install_greetd_if_no_dm | bool
            - force_greetd | bool or not has_display_manager

      - name: Ensure graphical target is default when greetd is used
        ansible.builtin.command: systemctl set-default graphical.target
        changed_when: false
        when:
            - install_greetd_if_no_dm | bool
            - force_greetd | bool or not has_display_manager

      - name: Enable and start greetd when installed
        ansible.builtin.systemd:
            name: greetd
            enabled: true
            state: started
        when:
            - install_greetd_if_no_dm | bool
            - force_greetd | bool or not has_display_manager

      - name: Disable existing display manager when greetd is forced
        ansible.builtin.systemd:
            name: display-manager
            enabled: false
            state: stopped
        when:
            - force_greetd | bool
            - has_display_manager | bool
        failed_when: false

      - name: Enable and start libvirtd
        ansible.builtin.systemd:
            name: libvirtd
            enabled: true
            state: started

      - name: Add user to virtualization groups
        ansible.builtin.user:
            name: "{{ dotfiles_user_name }}"
            groups:
                - libvirt
                - kvm
            append: true

      - name: Set default shell to zsh
        ansible.builtin.user:
            name: "{{ dotfiles_user_name }}"
            shell: /bin/zsh

      - name: Enable core services
        ansible.builtin.systemd:
            name: "{{ item }}"
            enabled: true
            state: started
        loop: "{{ core_services }}"

      - name: Install Go developer tools
        ansible.builtin.command:
            cmd: "go install {{ item.module }}"
            creates: "{{ dotfiles_user_home }}/go/bin/{{ item.binary }}"
        loop: "{{ go_tools }}"
        loop_control:
            label: "{{ item.name }}"
        become: false

      - name: Enable yazi COPR repo
        ansible.builtin.command:
            cmd: "dnf -y copr enable {{ yazi_copr_repo }}"
            creates: "{{ yazi_copr_repo_file }}"

      - name: Install yazi
        ansible.builtin.dnf:
            name: yazi
            state: present

      - name: Install fnm
        ansible.builtin.shell: "curl -fsSL https://fnm.vercel.app/install | bash"
        args:
            creates: "{{ dotfiles_user_home }}/.local/share/fnm/fnm"
        become: false

      - name: Install Bun
        ansible.builtin.shell: "curl -fsSL https://bun.sh/install | bash"
        args:
            creates: "{{ dotfiles_user_home }}/.bun/bin/bun"
        become: false

      - name: Install OpenCode (Bun)
        ansible.builtin.command:
            cmd: "{{ dotfiles_user_home }}/.bun/bin/bun add -g opencode-ai"
            creates: "{{ dotfiles_user_home }}/.bun/bin/opencode"
        become: false

      - name: Add Flathub remote
        ansible.builtin.command:
            cmd: "flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo"

      - name: Install Flatpak applications
        ansible.builtin.command:
            cmd: "flatpak install -y --noninteractive flathub {{ item }}"
        register: flatpak_install
        changed_when: "'already installed' not in (flatpak_install.stdout | lower)"
        loop: "{{ flatpak_apps }}"
        loop_control:
            label: "{{ item }}"

      - name: Remove Flatpak YouTube Music if present
        ansible.builtin.command:
            cmd: "flatpak uninstall -y --noninteractive app.ytmdesktop.ytmdesktop"
        register: flatpak_remove_ytm
        changed_when: "'not installed' not in (flatpak_remove_ytm.stdout | lower) and 'not installed' not in (flatpak_remove_ytm.stderr | lower)"
        failed_when: false
        when: install_youtube_music_rpm | bool

      - name: Install YouTube Music (Pear Desktop) RPM
        ansible.builtin.dnf:
            name: "{{ youtube_music_rpm_url }}"
            state: present
            disable_gpg_check: true
        when: install_youtube_music_rpm | bool

      - name: Announce window manager setup
        ansible.builtin.debug:
            msg: "Window manager: Niri + Dank Material Shell"
        changed_when: false

      - name: Enable DMS COPR repo
        ansible.builtin.command:
            cmd: "dnf -y copr enable {{ dms_copr_repo }}"
            creates: "{{ dms_copr_repo_file }}"

      - name: Install Niri + DMS
        ansible.builtin.dnf:
            name:
                - niri
                - dms
            state: present

      - name: Ensure user systemd wants directory
        ansible.builtin.file:
            path: "{{ dotfiles_user_home }}/.config/systemd/user/niri.service.wants"
            state: directory
            mode: "0755"
        become: false

      - name: Check for DMS user service
        ansible.builtin.stat:
            path: /usr/lib/systemd/user/dms.service
        register: dms_service

      - name: Link DMS to Niri wants
        ansible.builtin.file:
            src: /usr/lib/systemd/user/dms.service
            dest: "{{ dotfiles_user_home }}/.config/systemd/user/niri.service.wants/dms.service"
            state: link
        when: dms_service.stat.exists
        become: false

      - name: Announce font setup
        ansible.builtin.debug:
            msg: "Fonts: Nerd Fonts"
        changed_when: false
        become: false

      - name: Ensure font directories
        ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: "0755"
        loop:
            - "{{ dotfiles_fonts_dir }}"
            - "{{ dotfiles_fonts_cache_dir }}"
        become: false

      - name: Download Nerd Fonts
        ansible.builtin.get_url:
            url: "{{ item.url }}"
            dest: "{{ dotfiles_fonts_cache_dir }}/{{ item.name }}.zip"
            mode: "0644"
        register: nerd_fonts_download
        loop: "{{ nerd_fonts }}"
        loop_control:
            label: "{{ item.name }}"
        become: false

      - name: Install Nerd Fonts
        ansible.builtin.unarchive:
            src: "{{ dotfiles_fonts_cache_dir }}/{{ item.item.name }}.zip"
            dest: "{{ dotfiles_fonts_dir }}"
            remote_src: true
        loop: "{{ nerd_fonts_download.results }}"
        loop_control:
            label: "{{ item.item.name }}"
        when: item.changed
        become: false
        notify: Refresh font cache

      - name: Announce editor setup
        ansible.builtin.debug:
            msg: "Editors: Zed"
        changed_when: false
        become: false

      - name: Install Zed editor
        ansible.builtin.shell: "curl -f https://zed.dev/install.sh | sh"
        args:
            creates: "{{ dotfiles_user_home }}/.local/bin/zed"
        become: false

      - name: Announce gaming setup
        ansible.builtin.debug:
            msg: "Gaming packages (optional)"
        changed_when: false
        become: false

      - name: Install gaming packages (optional)
        ansible.builtin.dnf:
            name: "{{ gaming_packages }}"
            state: present
        when:
            - install_steam | bool
            - gaming_packages | length > 0

      - name: Autoremove unneeded packages installed as dependencies
        ansible.builtin.dnf:
            autoremove: true

  handlers:
      - name: Refresh font cache
        ansible.builtin.command: fc-cache -f
        become: false
